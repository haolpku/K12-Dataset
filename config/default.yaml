# K12-Dataset Pipeline 统一配置
# 路径相对于本文件所在目录解析；支持 ${ENV_VAR} 环境变量插值

paths:
  books_yaml: ../books.yaml                    # 书目注册表
  input_dir: ../input                          # 原始教材 Markdown 输入根目录
  workspace_dir: ../workspace                  # 中间产物（gitignored）
  output_dir: ../data                          # 最终 KG 数据

llm:
  provider: openai
  model: gpt-4.1-mini
  base_url: ${OPENAI_BASE_URL}
  api_key: ${OPENAI_API_KEY}
  max_concurrency: 8
  temperature: 0.0

merge:
  normalize: nfkc_lower                        # 名称归一化策略
  dedup_labels:                                # 参与去重的节点类型
    - Concept
    - Skill
    - Experiment
    - Exercise
