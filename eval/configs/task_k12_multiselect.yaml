name: k12_multiselect_strict_format
description: K12 多选题评测任务，要求模型仅输出标准答案字母集合。

allowed_labels: ["A", "B", "C", "D"]

system_prompt: |
  你是一个K12教学专家。
  请根据题目要求输出“正确选项字母集合”，且必须严格遵守格式：
  1) 只能使用大写字母 A/B/C/D
  2) 输出示例："A" 或 "A,C"
  4) 多个字母必须按字母升序排列
  5) 只能使用英文逗号分隔，不允许空格
  6) **不允许输出任何解释、分析、前后缀、标点或换行**
  
  每道题目可能有一个或多个选项正确，错选、多选、漏选均不得分。

user_prompt_template: |
  题目：{question}
  A. {A}
  B. {B}
  C. {C}
  D. {D}
  请**直接给出答案字母集合**：

