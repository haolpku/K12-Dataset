name: gpt4o_openai
description: GPT-4o 通过 OpenAI 兼容 API 调用配置（变量来自 eval/configs/.env）

api:
  base_url: "${OPENAI_BASE_URL}"
  api_key_env: "OPENAI_API_KEY"
  model: "gpt-4o"

request:
  temperature: 0.0
  top_p: 1.0
  max_tokens: 32
  timeout: 120
  reasoning_effort: "none"
  extra_body:
    chat_template_kwargs:
      enable_thinking: false

